services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: cvbuilder
      POSTGRES_USER: cvbuilder
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cvbuilder_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cvbuilder"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      FLASK_APP: wsgi:app
      FLASK_ENV: ${FLASK_ENV:-production}
      DATABASE_URL: postgresql://cvbuilder:${POSTGRES_PASSWORD:-cvbuilder_dev}@db:5432/cvbuilder
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - internal
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx-http.conf:/etc/nginx/nginx-http.conf:ro
      - ./nginx/nginx-https.conf:/etc/nginx/nginx-https.conf:ro
      - ./nginx/entrypoint.sh:/etc/nginx/entrypoint.sh:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    entrypoint: ["/bin/sh", "/etc/nginx/entrypoint.sh"]
    command: ["nginx", "-g", "daemon off;"]
    depends_on:
      - backend
      - frontend
    networks:
      - internal
      - external

volumes:
  postgres_data:

networks:
  internal:
    driver: bridge
  external:
    driver: bridge
