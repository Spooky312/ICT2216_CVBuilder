worker_processes auto;

events { worker_connections 1024; }

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # Docker's embedded DNS — required for variable-based proxy_pass so that
    # upstream hostnames are resolved per-request rather than at startup.
    # This prevents nginx from refusing to start when backend/frontend aren't
    # reachable yet.
    resolver 127.0.0.11 valid=30s ipv6=off;

    # Security headers applied to all responses
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; frame-src 'self' blob:;" always;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=login:10m    rate=5r/m;
    limit_req_zone $binary_remote_addr zone=register:10m rate=1r/m;
    limit_req_zone $binary_remote_addr zone=api:10m      rate=60r/m;

    server {
        listen 80;
        server_name _;

        client_max_body_size 2m;

        # Variables defer DNS lookup to request time (requires resolver above).
        set $backend  http://backend:5000;
        set $frontend http://frontend:80;

        # 1. Login API Endpoint
        location /api/auth/login {
            limit_req zone=login burst=5 nodelay;
            proxy_pass $backend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 2. Register API Endpoint
        location /api/auth/register {
            limit_req zone=register burst=3 nodelay;
            proxy_pass $backend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 3. All other API Endpoints
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass $backend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # 4. Frontend Catch-All (React handles everything else!)
        location / {
            proxy_pass $frontend;
            proxy_set_header Host $host;
        }
    }
}
