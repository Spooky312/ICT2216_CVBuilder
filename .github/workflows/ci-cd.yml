name: CI/CD

on:
  push:
    branches: [main, master, dev]
  pull_request:
    branches: [main, master, dev]
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  backend-tests:
    name: Python Flask tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    env:
      FLASK_ENV: testing
      SECRET_KEY: test-secret-key
      JWT_SECRET_KEY: test-jwt-secret-key
      REDIS_URL: memory://

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Flask unit tests with coverage
        run: pytest tests --cov=app --cov-report=term-missing --cov-report=xml

      - name: Upload Python coverage report
        uses: actions/upload-artifact@v4
        with:
          name: python-backend-coverage
          path: backend/coverage.xml

  frontend-build:
    name: React Vite build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install React dependencies
        run: npm ci

      - name: Build React frontend
        run: npm run build

  python-static-analysis:
    name: Python Flake8 and Bandit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install Python analysis dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 bandit

      - name: Create Python reports directory
        run: mkdir -p reports

      - name: Run Flake8 critical Python checks
        run: flake8 app tests --count --select=E9,F63,F7,F82 --show-source --statistics | tee reports/flake8-critical-report.txt

      - name: Run Flake8 full Python report
        if: always()
        run: flake8 app tests --count --show-source --statistics --max-line-length=100 --exit-zero | tee reports/flake8-full-report.txt

      - name: Run Bandit Python security scan
        run: bandit -r app -lll -f txt -o reports/bandit-report.txt

      - name: Upload Python static analysis reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: python-static-analysis-reports
          path: backend/reports

  react-static-analysis:
    name: React ESLint and npm audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install React dependencies
        run: npm ci

      - name: Install React analysis dependencies
        run: npm install --no-save eslint@^9.39.4 @eslint/js@^9.39.4 eslint-plugin-react@^7.37.5 eslint-plugin-react-hooks@^7.0.1

      - name: Create React reports directory
        run: mkdir -p reports

      - name: Run React ESLint
        run: npx eslint "src/**/*.{js,jsx}" --max-warnings=0 -o reports/eslint-report.txt

      - name: Run npm audit for React dependencies
        run: npm audit --audit-level=high --omit=dev --json > reports/npm-audit-report.json

      - name: Upload React static analysis reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: react-static-analysis-reports
          path: frontend/reports

  dependency-check:
    name: OWASP Dependency-Check
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create Dependency-Check reports directory
        run: mkdir -p reports/dependency-check

      - name: Install frontend dependencies for Dependency-Check
        working-directory: frontend
        run: npm ci

      - name: Run OWASP Dependency-Check
        id: dependency-check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: ICT2216 CVBuilder
          path: .
          format: ALL
          out: "reports/dependency-check"
          args: >
            --enableExperimental
            --enableRetired
            --suppression .github/dependency-check-suppressions.xml
            --failOnCVSS 7
            --exclude "**/.git/**"
            --exclude "**/node_modules/**"
            --exclude "**/.venv/**"
            --exclude "**/venv/**"
            --exclude "**/dist/**"
            --exclude "**/build/**"
            --exclude "**/__pycache__/**"

      - name: Upload Dependency-Check reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: owasp-dependency-check-reports
          path: "reports/dependency-check"

      - name: Upload Dependency-Check SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: ${{ always() && (github.event.repository.private == false || vars.ENABLE_CODE_SCANNING == 'true') && hashFiles('reports/dependency-check/dependency-check-report.sarif') != '' }}
        with:
          sarif_file: reports/dependency-check/dependency-check-report.sarif

  codeql:
    name: CodeQL Analysis (${{ matrix.language }})
    runs-on: ubuntu-latest
    if: ${{ github.event.repository.private == false }}
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript-typescript]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:${{ matrix.language }}

  sonarqube-config:
    name: SonarQube Configuration
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
    outputs:
      configured: ${{ steps.detect.outputs.configured }}

    steps:
      - name: Detect SonarQube configuration
        id: detect
        run: |
          if [ -n "$SONAR_TOKEN" ] && [ -n "$SONAR_HOST_URL" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
            echo "SonarQube configuration detected."
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "SonarQube scan will be skipped because SONAR_TOKEN and/or SONAR_HOST_URL is not configured."
            echo "Add repository secrets SONAR_TOKEN and SONAR_HOST_URL to enable analysis."
          fi

      - name: Require SonarQube configuration before deploy
        if: ${{ github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && steps.detect.outputs.configured != 'true' }}
        run: |
          echo "SONAR_TOKEN and SONAR_HOST_URL must be configured before deploying from main."
          exit 1

  sonarqube:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    needs: sonarqube-config
    if: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' && needs.sonarqube-config.outputs.configured == 'true' }}

    env:
      FLASK_ENV: testing
      SECRET_KEY: test-secret-key
      JWT_SECRET_KEY: test-jwt-secret-key
      REDIS_URL: memory://
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install Python dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate Python coverage report
        working-directory: backend
        run: pytest tests --cov=app --cov-report=xml

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install React dependencies
        working-directory: frontend
        run: npm ci

      - name: Build React frontend
        working-directory: frontend
        run: npm run build

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs:
      - backend-tests
      - frontend-build
      - python-static-analysis
      - react-static-analysis
      - dependency-check
      - codeql
      - sonarqube-config
      - sonarqube
    if: >-
      ${{
        always() &&
        github.ref == 'refs/heads/main' &&
        github.event_name != 'pull_request' &&
        needs.backend-tests.result == 'success' &&
        needs.frontend-build.result == 'success' &&
        needs.python-static-analysis.result == 'success' &&
        needs.react-static-analysis.result == 'success' &&
        needs.dependency-check.result == 'success' &&
        needs.sonarqube-config.result == 'success' &&
        needs.sonarqube.result == 'success' &&
        (
          needs.codeql.result == 'success' ||
          (github.event.repository.private == true && needs.codeql.result == 'skipped')
        )
      }}

    steps:
      - name: Deploy to EC2 over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_SSH_PORT || 22 }}
          script: |
            set -e
            cd "${{ secrets.EC2_DEPLOY_PATH }}"
            git pull origin main
            docker compose up -d --build --remove-orphans
            docker image prune -f
