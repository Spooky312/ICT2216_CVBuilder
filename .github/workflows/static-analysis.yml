name: Python and React Static Analysis

on:
  push:
    branches: [main, master, dev]
  pull_request:
    branches: [main, master, dev]

jobs:
  python-static-analysis:
    name: Python Flake8 and Bandit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install Python analysis dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 bandit

      - name: Create Python reports directory
        run: mkdir -p reports

      - name: Run Flake8 critical Python checks
        run: flake8 app tests --count --select=E9,F63,F7,F82 --show-source --statistics | tee reports/flake8-critical-report.txt

      - name: Run Flake8 full Python report
        if: always()
        run: flake8 app tests --count --show-source --statistics --max-line-length=100 --exit-zero | tee reports/flake8-full-report.txt

      - name: Run Bandit Python security scan
        run: bandit -r app -lll -f txt -o reports/bandit-report.txt

      - name: Upload Python static analysis reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: python-static-analysis-reports
          path: backend/reports

  react-static-analysis:
    name: React ESLint and npm audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install React dependencies
        run: npm ci

      - name: Install React analysis dependencies
        run: npm install --no-save eslint@^9.39.4 @eslint/js@^9.39.4 eslint-plugin-react@^7.37.5 eslint-plugin-react-hooks@^7.0.1

      - name: Create React reports directory
        run: mkdir -p reports

      - name: Run React ESLint
        run: npx eslint "src/**/*.{js,jsx}" --max-warnings=0 -o reports/eslint-report.txt

      - name: Run npm audit for React dependencies
        run: npm audit --audit-level=high --omit=dev --json > reports/npm-audit-report.json

      - name: Upload React static analysis reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: react-static-analysis-reports
          path: frontend/reports
