name: Flask Static Analysis

on:
  push:
    branches: [main, master, dev]
  pull_request:
    branches: [main, master, dev]

jobs:
  python-static-analysis:
    name: Flake8 and Bandit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install analysis dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 bandit

      - name: Create reports directory
        run: mkdir -p reports

      - name: Run Flake8 style and quality checks
        continue-on-error: true
        run: flake8 app tests --count --show-source --statistics --max-line-length=100 | tee reports/flake8-report.txt

      - name: Run Bandit Flask security scan
        continue-on-error: true
        run: bandit -r app -lll -f txt -o reports/bandit-report.txt

      - name: Upload static analysis reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: flask-static-analysis-reports
          path: backend/reports