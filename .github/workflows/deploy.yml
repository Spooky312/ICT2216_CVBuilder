name: Deploy to EC2

on:
  workflow_run:
    workflows:
      - Python and React CI
      - Python and React Static Analysis
      - OWASP Dependency-Check
      - Python and React CodeQL Analysis
      - Python and React SonarQube Analysis
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  actions: read
  contents: read

concurrency:
  group: deploy-${{ github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: true

jobs:
  verify-required-workflows:
    name: Verify all required workflows passed
    runs-on: ubuntu-latest

    steps:
      - name: Check required workflow results for this commit
        uses: actions/github-script@v7
        env:
          TARGET_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
          TARGET_BRANCH: ${{ github.event.workflow_run.head_branch || github.ref_name }}
        with:
          script: |
            const requiredWorkflows = [
              'Python and React CI',
              'Python and React Static Analysis',
              'OWASP Dependency-Check',
              'Python and React CodeQL Analysis',
              'Python and React SonarQube Analysis',
            ];

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const targetSha = process.env.TARGET_SHA;
            const targetBranch = process.env.TARGET_BRANCH;
            const timeoutMs = 15 * 60 * 1000;
            const intervalMs = 30 * 1000;
            const startedAt = Date.now();

            if (targetBranch !== 'main') {
              core.setFailed(`Deployment is only allowed from main, but this run targeted ${targetBranch}.`);
              return;
            }

            const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

            async function latestRunForWorkflow(workflowName) {
              const runs = await github.paginate(github.rest.actions.listWorkflowRunsForRepo, {
                owner,
                repo,
                branch: targetBranch,
                head_sha: targetSha,
                per_page: 100,
              });

              return runs
                .filter((run) => run.name === workflowName)
                .sort((a, b) => new Date(b.created_at) - new Date(a.created_at))[0];
            }

            while (true) {
              const missing = [];
              const pending = [];
              const failed = [];

              for (const workflowName of requiredWorkflows) {
                const run = await latestRunForWorkflow(workflowName);

                if (!run) {
                  missing.push(workflowName);
                  continue;
                }

                core.info(`${workflowName}: ${run.status} / ${run.conclusion ?? 'no conclusion yet'}`);

                if (run.status !== 'completed') {
                  pending.push(workflowName);
                  continue;
                }

                if (run.conclusion !== 'success') {
                  failed.push(`${workflowName} concluded ${run.conclusion}`);
                }
              }

              if (failed.length > 0) {
                core.setFailed(`Deployment blocked because required workflow(s) failed: ${failed.join('; ')}`);
                return;
              }

              if (missing.length === 0 && pending.length === 0) {
                core.info(`All required workflows passed for ${targetSha}.`);
                return;
              }

              if (Date.now() - startedAt > timeoutMs) {
                const waitingOn = [...missing.map((name) => `${name} has no run`), ...pending.map((name) => `${name} is still running`)];
                core.setFailed(`Deployment blocked while waiting for required workflow(s): ${waitingOn.join('; ')}`);
                return;
              }

              const waitingOn = [...missing.map((name) => `${name} has not started`), ...pending.map((name) => `${name} is still running`)];
              core.info(`Waiting before deploy: ${waitingOn.join('; ')}`);
              await sleep(intervalMs);
            }

  predeploy-checks:
    name: Python and React pre-deploy checks
    runs-on: ubuntu-latest
    needs: verify-required-workflows

    env:
      FLASK_ENV: testing
      SECRET_KEY: test-secret-key
      JWT_SECRET_KEY: test-jwt-secret-key
      REDIS_URL: memory://

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install Python dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Python backend tests
        working-directory: backend
        run: pytest tests

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install React dependencies
        working-directory: frontend
        run: npm ci

      - name: Build React frontend
        working-directory: frontend
        run: npm run build

  deploy:
    name: Deploy checked build to EC2
    runs-on: ubuntu-latest
    needs: predeploy-checks
    if: ${{ needs.predeploy-checks.result == 'success' }}
    steps:
      - name: Deploy to EC2 over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_SSH_PORT || 22 }}
          script: |
            set -e
            cd "${{ secrets.EC2_DEPLOY_PATH }}"
            git pull origin main
            docker compose up -d --build --remove-orphans
            docker image prune -f
