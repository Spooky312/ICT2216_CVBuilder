version: "3.9"

# Development override — no TLS, hot-reload frontend, exposes ports directly
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: cvbuilder
      POSTGRES_USER: cvbuilder
      POSTGRES_PASSWORD: cvbuilder_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    networks:
      - dev

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - dev

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      FLASK_APP: wsgi:app
      FLASK_ENV: development
      SECRET_KEY: dev-secret-key-not-for-production
      JWT_SECRET_KEY: dev-jwt-secret-not-for-production
      DATABASE_URL: postgresql://cvbuilder:cvbuilder_dev@db:5432/cvbuilder
      REDIS_URL: redis://redis:6379/0
      FRONTEND_URL: http://localhost:3000
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
    depends_on:
      - db
      - redis
    networks:
      - dev
    command: ["python", "wsgi.py"]

volumes:
  postgres_data_dev:

networks:
  dev:
    driver: bridge
